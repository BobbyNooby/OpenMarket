name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Type check server
        run: cd packages/server && npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openmarket
          POSTGRES_PASSWORD: openmarket
          POSTGRES_DB: openmarket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://openmarket:openmarket@localhost:5432/openmarket_test
      API_PORT: 3000
      PUBLIC_API_URL: http://localhost:3000
      BETTER_AUTH_SECRET: test-secret-for-ci-only
      BETTER_AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Push DB schema
        run: pnpm db:push
      - name: Seed RBAC
        run: pnpm --filter @openmarket/server db:seed:rbac
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run E2E tests
        run: npx playwright test
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
